# ─────────────────────────────────────────────────────────────
#  Smart Refund Routing System — Configuration
# ─────────────────────────────────────────────────────────────

# ── Retry Policy ──────────────────────────────────────────────
# Maximum number of channel attempts before giving up
retry.max_attempts=3
# Delay before first retry (milliseconds)
retry.initial_delay_ms=1000
# Multiplier applied to delay on each subsequent retry (exponential backoff)
# e.g. 1s → 2s → 4s with multiplier=2.0
retry.backoff_multiplier=2.0

# ── Rate Limiting (per merchant) ──────────────────────────────
# Maximum routing requests allowed per merchant within the window
rate_limit.requests_per_window=20
# Sliding window duration (milliseconds); default = 60 seconds
rate_limit.window_ms=60000

# ── Routing Thresholds ────────────────────────────────────────
# Refund amounts above this value trigger HighValueRule (BANK_TRANSFER / MANUAL_REVIEW)
routing.high_value_threshold=50000
# Refund amounts below this value are shortcut to WALLET_CREDIT in ChannelScoringRule
routing.small_amount_threshold=500
# Minimum success rate for OriginalPaymentMethodRule to prefer the original method
routing.original_method_min_success_rate=0.85

# ── Server ────────────────────────────────────────────────────
server.port=8080
